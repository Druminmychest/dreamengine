<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curation — Rocky's Dream Engine</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0A0A0A;
            color: #F5F2EC;
            font-family: Georgia, serif;
            min-height: 100vh;
            padding: 1.5rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .title {
            font-size: 1rem;
            color: #C9A84C;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .remaining {
            font-size: 0.8rem;
            color: #555;
            margin-top: 0.5rem;
            font-family: Calibri, sans-serif;
        }

        .phrase-box {
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .phrase-text {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #F5F2EC;
            font-style: italic;
            margin-bottom: 1.2rem;
        }

        textarea {
            width: 100%;
            background: #0A0A0A;
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            color: #F5F2EC;
            font-family: Georgia, serif;
            font-size: 1rem;
            line-height: 1.7;
            padding: 0.8rem;
            resize: none;
            min-height: 80px;
            outline: none;
            margin-bottom: 1rem;
        }

        textarea:focus {
            border-color: #C9A84C;
        }

        select {
            width: 100%;
            background: #0A0A0A;
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            color: #F5F2EC;
            font-family: Calibri, sans-serif;
            font-size: 1rem;
            padding: 0.8rem;
            margin-bottom: 1.2rem;
            outline: none;
            appearance: none;
        }

        select:focus {
            border-color: #C9A84C;
        }

        .buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
        }

        .btn-approve {
            background: transparent;
            border: 1px solid #C9A84C;
            color: #C9A84C;
            font-family: Georgia, serif;
            font-size: 1rem;
            padding: 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-approve:hover, .btn-approve:active {
            background: #C9A84C;
            color: #0A0A0A;
        }

        .btn-reject {
            background: transparent;
            border: 1px solid #333;
            color: #555;
            font-family: Georgia, serif;
            font-size: 1rem;
            padding: 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-reject:hover, .btn-reject:active {
            border-color: #666;
            color: #888;
        }

        .empty {
            text-align: center;
            color: #444;
            font-style: italic;
            margin-top: 4rem;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">Rocky's Dream Engine</div>
        <div class="remaining">{{ remaining }} phrases pending</div>
    </div>

    {% if phrase %}
    <form method="POST" action="/admin/curate">
        <input type="hidden" name="phrase_id" value="{{ phrase.phrase_id }}">
        <input type="hidden" name="redirect_to" value="/admin/mobile">

        <div class="phrase-box">
            <div class="phrase-text">{{ phrase.raw_text }}</div>

            <textarea name="edited_text">{{ phrase.raw_text }}</textarea>

            <select name="hexagram_id">
                <option value="">— assign hexagram —</option>
                {% for h in hexagrams %}
                <option value="{{ h.hexagram_id }}">
                    {{ h.number }} — {{ h.name_english }}
                </option>
                {% endfor %}
            </select>

            <div class="buttons">
                <button type="submit" name="action" value="approve" class="btn-approve">
                    Approve
                </button>
                <button type="submit" name="action" value="reject" class="btn-reject">
                    Reject
                </button>
            </div>
        </div>
    </form>

    {% else %}
    <div class="empty">
        The queue is empty.<br>Rocky is well fed.
    </div>
    {% endif %}
</body>
</html>
